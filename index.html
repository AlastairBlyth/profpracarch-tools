<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Monitor — profpracarch.org</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-secondary: #f7f6f2; --text: #1a1a1a;
      --text-secondary: #555550; --text-tertiary: #999990;
      --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.22);
      --teal-bg: #E1F5EE; --teal-text: #0F6E56;
      --amber-bg: #FAEEDA; --amber-text: #BA7517;
      --red-bg: #FCEBEB; --red-text: #A32D2D;
      --blue-bg: #E6F1FB; --blue-text: #185FA5;
      --radius: 8px; --radius-lg: 12px;
      --mono: 'Courier New', Courier, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg-secondary: #252523; --text: #f0ede6;
        --text-secondary: #aaa89f; --text-tertiary: #666660;
        --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
        --teal-bg: #083428; --teal-text: #5DCAA5;
        --amber-bg: #2c1f06; --amber-text: #FAC775;
        --red-bg: #2c0f0f; --red-text: #F09595;
        --blue-bg: #042C53; --blue-text: #85B7EB;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-secondary); color: var(--text); min-height: 100vh; line-height: 1.6; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    button { background: transparent; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 7px 16px; font-size: 13px; font-family: inherit; color: var(--text); cursor: pointer; transition: background 0.15s; }
    button:hover { background: var(--bg-secondary); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    button.primary:hover { opacity: 0.85; }
    button.cms-btn { background: var(--teal-bg); color: var(--teal-text); border-color: var(--teal-text); font-weight: 500; }
    button.cms-btn:hover { opacity: 0.85; background: var(--teal-bg); }
    button.cms-btn:disabled { opacity: 0.4; }
    button.cms-sent { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-text); }
    button.cms-err { background: var(--red-bg); color: var(--red-text); border-color: var(--red-text); }
    input[type="password"], input[type="text"], textarea { width: 100%; padding: 8px 12px; font-size: 13px; font-family: var(--mono); background: var(--bg); border: 0.5px solid var(--border-strong); border-radius: var(--radius); color: var(--text); }
    textarea { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; resize: vertical; line-height: 1.7; }
    input:focus, textarea:focus { outline: none; border-color: var(--text); }
    a { color: var(--teal-text); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .mono { font-family: var(--mono); }
    .label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
    .source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
    .source-tile { border-radius: var(--radius); padding: 10px 12px; border: 0.5px solid var(--border); transition: background 0.4s; }
    .result-list { display: flex; flex-direction: column; gap: 1rem; }
    .result-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
    .result-card.sent-to-cms { border-color: var(--teal-text); }
    .tag { display: inline-block; font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 4px; }
    .tag.teal { background: var(--teal-bg); color: var(--teal-text); }
    .tag.blue { background: var(--blue-bg); color: var(--blue-text); }
    .tag.muted { background: var(--bg-secondary); color: var(--text-tertiary); }
    .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
    .empty-state { text-align: center; padding: 3rem 1rem; border: 0.5px solid var(--border); border-radius: var(--radius-lg); color: var(--text-secondary); }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .btn-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .edit-area { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
    .cms-notice { font-size: 11px; font-family: var(--mono); color: var(--teal-text); margin-top: 6px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;
const SOURCES = [
  { id:"bsr",   name:"BSR / HSE",          query:"Building Safety Regulator HSE new publication guidance announcement 2026" },
  { id:"riba",  name:"RIBA",               query:"RIBA guidance practice note fee survey announcement 2026" },
  { id:"arb",   name:"ARB",                query:"ARB Architects Registration Board decision CPD framework 2026" },
  { id:"mhclg", name:"DLUHC / MHCLG",      query:"MHCLG planning policy NPPF consultation announcement 2026" },
  { id:"legis", name:"Legislation.gov.uk",  query:"Building Safety Act CDM regulations amendment statutory instrument 2026" },
  { id:"nbs",   name:"NBS",                query:"NBS National Building Specification update guidance 2026" },
  { id:"rics",  name:"RICS",               query:"RICS professional standard guidance note publication 2026" },
  { id:"aj",    name:"Architects Journal", query:"Architects Journal regulation profession news recent weeks 2026" },
];
const VALID_SECTIONS = ["Regulatory","Education","Practice","Planning","Ethics","Procurement","Global"];
const SYSTEM = `You are the content monitor for profpracarch.org, a professional practice resource for UK architects. Search for recent updates (last 2-4 weeks) from a specified source.
The profpracarch.org editorial voice: analytical and authoritative; opens with a short punchy sentence then measured qualifying analysis; notes tensions and unintended consequences; connects developments to practical implications for architects; avoids breathless enthusiasm; slightly dry wit; never promotional. Draft paragraphs 100-150 words.
IMPORTANT: Do not include any citation tags, reference markers, footnotes, or markup like <cite>, [1], or similar in your response. Write clean prose only.

After searching respond ONLY with a valid JSON object, no preamble, no markdown fences:
{"hasUpdate":true,"headline":"brief headline","summary":"draft paragraph 100-150 words","url":"source URL","date":"date if found","section":"Regulatory/Education/Practice/Planning/Ethics/Procurement/Global"}
If no significant update found: {"hasUpdate":false,"headline":"","summary":"","url":"","date":"","section":""}`;
function extractJSON(t){const m=t.match(/\{[\s\S]*\}/);if(!m)return null;try{return JSON.parse(m[0]);}catch{return null;}}
function toSlug(h){return h.toLowerCase().replace(/[^a-z0-9\s-]/g,"").trim().replace(/\s+/g,"-").slice(0,80);}
function ApiKeySetup({onSave}){
  const [ak,setAk]=useState(""); const [ck,setCk]=useState("");
  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"1.5rem"}}>
    <div style={{maxWidth:460,width:"100%"}}>
      <p className="label" style={{marginBottom:8}}>profpracarch.org</p>
      <h1 style={{fontSize:22,fontWeight:500,marginBottom:8}}>Content monitor</h1>
      <p style={{fontSize:14,color:"var(--text-secondary)",marginBottom:"1.5rem",lineHeight:1.7}}>Enter your API keys below. Both are saved only in this browser.</p>
      <div className="card" style={{marginBottom:12}}>
        <p className="label" style={{marginBottom:6}}>Anthropic API key <span style={{color:"var(--red-text)"}}>*</span></p>
        <input type="password" placeholder="sk-ant-..." value={ak} onChange={e=>setAk(e.target.value)} style={{marginBottom:6}}/>
        <p style={{fontSize:11,color:"var(--text-tertiary)",fontFamily:"var(--mono)"}}>Required · console.anthropic.com → API Keys</p>
      </div>
      <div className="card" style={{marginBottom:"1.5rem"}}>
        <p className="label" style={{marginBottom:6}}>profpracarch.org CMS key <span style={{color:"var(--text-tertiary)"}}>(optional)</span></p>
        <input type="password" placeholder="profprac2026admin" value={ck} onChange={e=>setCk(e.target.value)} style={{marginBottom:6}}/>
        <p style={{fontSize:11,color:"var(--text-tertiary)",fontFamily:"var(--mono)"}}>Enables one-click draft publishing to profpracarch.org</p>
      </div>
      <button className="primary" disabled={!ak.startsWith("sk-")} onClick={()=>onSave(ak,ck)} style={{width:"100%"}}>Save and open monitor</button>
    </div>
  </div>);}
function SourceTile({source,result,isRunning}){
  const status=isRunning?"checking":result?(result.hasUpdate?"found":result.error?"error":"clear"):"idle";
  const cfg={idle:{bg:"var(--bg-secondary)",color:"var(--text-tertiary)",label:"—"},checking:{bg:"var(--amber-bg)",color:"var(--amber-text)",label:"Checking…"},found:{bg:"var(--teal-bg)",color:"var(--teal-text)",label:"Update found"},clear:{bg:"var(--bg-secondary)",color:"var(--text-secondary)",label:"No update"},error:{bg:"var(--red-bg)",color:"var(--red-text)",label:"Error"}}[status];
  return(<div className="source-tile" style={{background:cfg.bg}}><p className="mono" style={{fontSize:11,fontWeight:600,marginBottom:4,color:"var(--text)"}}>{source.name}</p><p className="mono" style={{fontSize:11,color:cfg.color}}>{cfg.label}</p></div>);}
function ResultCard({r,cmsKey}){
  const [copied,setCopied]=useState(false);
  const [cmsStatus,setCmsStatus]=useState("idle");
  const [editTitle,setEditTitle]=useState(r.headline);
  const [editBody,setEditBody]=useState(r.summary);
  const [editSec,setEditSec]=useState(VALID_SECTIONS.includes(r.section)?r.section:"Practice");
  const [editing,setEditing]=useState(false);
  const copy=()=>{navigator.clipboard.writeText(editBody);setCopied(true);setTimeout(()=>setCopied(false),1500);};
  const sendToCMS=async()=>{
    setCmsStatus("sending");
    const slug=toSlug(editTitle)+"-"+Date.now().toString(36);
    try{
      const resp=await fetch("https://profpracarch.org/api/articles",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${cmsKey}`},body:JSON.stringify({title:editTitle,slug,summary:editBody.slice(0,200),content:editBody+(r.url?`\n\n[Source](${r.url})`:""),section:editSec,status:"draft",tags:[r.source.name],source:r.url||""})});
      if(!resp.ok)throw new Error(`${resp.status}`);
      setCmsStatus("sent");
    }catch(e){setCmsStatus("error");setTimeout(()=>setCmsStatus("idle"),3000);}
  };
  const cmsLabel={idle:"Send to CMS →",sending:"Sending…",sent:"Sent — view draft ↗",error:"Failed — retry?"}[cmsStatus];
  const cmsClass={idle:"cms-btn",sending:"cms-btn",sent:"cms-sent",error:"cms-err"}[cmsStatus];
  return(<div className={`result-card${cmsStatus==="sent"?" sent-to-cms":""}`}>
    <div className="flex-between" style={{marginBottom:10}}>
      <div className="btn-row">
        <span className="tag teal">{r.source.name}</span>
        <span className="tag muted">{editSec}</span>
        {r.date&&<span className="mono" style={{fontSize:11,color:"var(--text-tertiary)"}}>{r.date}</span>}
        {cmsStatus==="sent"&&<span className="tag blue">Draft in CMS</span>}
      </div>
      <div className="btn-row">
        {r.url&&<a href={r.url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,padding:"5px 10px",border:"0.5px solid var(--border-strong)",borderRadius:"var(--radius)"}}>Source ↗</a>}
        <button onClick={()=>setEditing(e=>!e)} style={{fontSize:12}}>{editing?"Done":"Edit"}</button>
        <button onClick={copy}>{copied?"Copied ✓":"Copy"}</button>
        {cmsKey&&(cmsStatus==="sent"?<a href="https://profpracarch.org/admin/articles" target="_blank" rel="noopener noreferrer"><button className={cmsClass}>{cmsLabel}</button></a>:<button className={cmsClass} disabled={cmsStatus==="sending"} onClick={sendToCMS}>{cmsLabel}</button>)}
      </div>
    </div>
    {editing?(<div className="edit-area">
      <p className="label" style={{marginBottom:6}}>Headline</p>
      <input type="text" value={editTitle} onChange={e=>setEditTitle(e.target.value)} style={{marginBottom:12}}/>
      <div className="flex-between" style={{marginBottom:6}}>
        <p className="label">Draft paragraph</p>
        <select value={editSec} onChange={e=>setEditSec(e.target.value)} style={{fontSize:12,fontFamily:"var(--mono)",background:"var(--bg)",border:"0.5px solid var(--border-strong)",borderRadius:"var(--radius)",padding:"4px 8px",color:"var(--text)"}}>
          {VALID_SECTIONS.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
      <textarea rows={6} value={editBody} onChange={e=>setEditBody(e.target.value)}/>
    </div>):(<><p style={{fontSize:15,fontWeight:500,marginBottom:8,lineHeight:1.4}}>{editTitle}</p><p style={{fontSize:13,color:"var(--text-secondary)",lineHeight:1.75}}>{editBody}</p></>)}
    {cmsStatus==="sent"&&<p className="cms-notice">Draft created · review at profpracarch.org/admin/articles</p>}
  </div>);}
function DigestPanel({updates,onClose}){
  const [copied,setCopied]=useState(false);
  const date=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  const text=`profpracarch.org Content Monitor — ${date}\n${updates.length} update${updates.length>1?"s":""} found\n\n`+updates.map(r=>`${r.source.name.toUpperCase()}${r.section?" — "+r.section:""}\n${r.headline}\n\n${r.summary}${r.url?"\n\nSource: "+r.url:""}`).join("\n\n---\n\n");
  const copy=()=>{navigator.clipboard.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),1500);};
  return(<div className="card" style={{marginBottom:"1.5rem",background:"var(--bg-secondary)"}}>
    <div className="flex-between" style={{marginBottom:"1rem"}}>
      <div><p className="label">Email digest</p><p className="mono" style={{fontSize:11,color:"var(--text-tertiary)",marginTop:2}}>{updates.length} update{updates.length>1?"s":""} · {date}</p></div>
      <div className="btn-row"><button onClick={copy}>{copied?"Copied ✓":"Copy all"}</button><button onClick={onClose}>Close</button></div>
    </div>
    {updates.map((r,i)=>(<div key={r.source.id}>{i>0&&<hr className="divider"/>}<p className="mono" style={{fontSize:11,color:"var(--teal-text)",marginBottom:3}}>{r.source.name}{r.section?" · "+r.section:""}</p><p style={{fontSize:13,fontWeight:500,marginBottom:5}}>{r.headline}</p><p style={{fontSize:12,color:"var(--text-secondary)",lineHeight:1.7,marginBottom:r.url?4:0}}>{r.summary}</p>{r.url&&<a href={r.url} target="_blank" rel="noopener noreferrer" className="mono" style={{fontSize:11}}>{r.url}</a>}</div>))}
  </div>);}
function Monitor({apiKey,cmsKey,onClearKey}){
  const [results,setResults]=useState({});
  const [runningIds,setRunningIds]=useState(new Set());
  const [running,setRunning]=useState(false);
  const [showDigest,setShowDigest]=useState(false);
  const [lastRun,setLastRun]=useState(null);
  const checkSource=useCallback(async(source)=>{
    setRunningIds(prev=>{const n=new Set(prev);n.add(source.id);return n;});
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:SYSTEM,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:`Check for recent updates from: ${source.name}\nSearch: ${source.query}`}]})});
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const data=await resp.json();
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const parsed=extractJSON(text);
      const result=parsed||{hasUpdate:false,headline:"Could not parse response",summary:"",url:"",date:"",section:""};
      setResults(prev=>({...prev,[source.id]:{...result,source}}));
    }catch(e){setResults(prev=>({...prev,[source.id]:{hasUpdate:false,error:true,headline:`Error: ${e.message}`,summary:"",url:"",date:"",section:"",source}}));}
    setRunningIds(prev=>{const n=new Set(prev);n.delete(source.id);return n;});
  },[apiKey]);
  const runAll=useCallback(async()=>{setRunning(true);setResults({});setShowDigest(false);setLastRun(new Date());await Promise.allSettled(SOURCES.map(s=>checkSource(s)));setRunning(false);},[checkSource]);
  const allResults=Object.values(results);
  const updates=allResults.filter(r=>r.hasUpdate);
  const checked=allResults.length;
  const allDone=checked===SOURCES.length&&!running;
  return(<div className="wrap">
    <div className="flex-between" style={{borderBottom:"0.5px solid var(--border)",paddingBottom:"1rem",marginBottom:"1.5rem"}}>
      <div><p className="label" style={{marginBottom:4}}>profpracarch.org</p><h1 style={{fontSize:20,fontWeight:500}}>Content monitor</h1></div>
      <div className="btn-row">
        {lastRun&&<span className="mono" style={{fontSize:11,color:"var(--text-tertiary)"}}>Last run {lastRun.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span>}
        {cmsKey&&<span className="tag teal" style={{fontSize:10}}>CMS connected</span>}
        {updates.length>0&&allDone&&<button onClick={()=>setShowDigest(d=>!d)}>{showDigest?"Hide digest":`Digest (${updates.length})`}</button>}
        <button onClick={runAll} disabled={running} className="primary">{running?`Checking ${checked} / ${SOURCES.length}…`:"Run monitor"}</button>
        <button onClick={onClearKey} title="Change keys" style={{padding:"7px 10px",fontSize:11,color:"var(--text-tertiary)"}}>⚙</button>
      </div>
    </div>
    <div className="source-grid">{SOURCES.map(s=><SourceTile key={s.id} source={s} result={results[s.id]} isRunning={runningIds.has(s.id)}/>)}</div>
    {showDigest&&updates.length>0&&<DigestPanel updates={updates} onClose={()=>setShowDigest(false)}/>}
    {updates.length>0&&<div><p className="label" style={{marginBottom:"1rem"}}>{updates.length} update{updates.length>1?"s":""} found{cmsKey&&<span style={{marginLeft:8,color:"var(--teal-text)"}}>· Edit and send drafts to CMS below</span>}</p><div className="result-list">{updates.map(r=><ResultCard key={r.source.id} r={r} cmsKey={cmsKey}/>)}</div></div>}
    {allDone&&updates.length===0&&<div className="empty-state"><p style={{fontSize:14,marginBottom:4}}>No significant updates found across all 8 sources.</p><p className="mono" style={{fontSize:11,color:"var(--text-tertiary)"}}>Run again next week, or press Run monitor to re-check now.</p></div>}
    {checked===0&&!running&&<div className="empty-state"><p style={{fontSize:14,marginBottom:8}}>Press <strong>Run monitor</strong> to check all 8 sources.</p><p className="mono" style={{fontSize:11,color:"var(--text-tertiary)",lineHeight:1.9}}>BSR / HSE · RIBA · ARB · DLUHC / MHCLG<br/>Legislation.gov.uk · NBS · RICS · Architects Journal</p></div>}
  </div>);}
function App(){
  const [ak,setAk]=useState(()=>localStorage.getItem("ppa_anthropic_key")||"");
  const [ck,setCk]=useState(()=>localStorage.getItem("ppa_cms_key")||"");
  const saveKeys=(a,c)=>{localStorage.setItem("ppa_anthropic_key",a);localStorage.setItem("ppa_cms_key",c);setAk(a);setCk(c);};
  const clearKeys=()=>{localStorage.removeItem("ppa_anthropic_key");localStorage.removeItem("ppa_cms_key");setAk("");setCk("");};
  if(!ak)return <ApiKeySetup onSave={saveKeys}/>;
  return <Monitor apiKey={ak} cmsKey={ck} onClearKey={clearKeys}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
